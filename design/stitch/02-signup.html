<body class="bg-background text-on-background min-h-screen flex flex-col font-body-lg text-body-lg antialiased atmospheric-glow">

<h1 class="font-display-sm text-display-sm text-primary mb-base">

<p class="font-body-sm text-body-sm text-on-surface-variant/80 tracking-wide uppercase">

<form class="space-y-lg w-full" onsubmit="event.preventDefault();">
<!-- Full Name Field -->
<div class="space-y-xs group">
<label class="font-label-caps text-label-caps text-on-surface-variant/60 group-focus-within:text-primary transition-colors block px-xs">Full Name</label>

<input class="input-premium w-full rounded-lg py-sm pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none" placeholder="Julian Newman" type="text"/>
</div>
</div>
<!-- Email Field -->
<div class="space-y-xs group">
<label class="font-label-caps text-label-caps text-on-surface-variant/60 group-focus-within:text-primary transition-colors block px-xs">Email Address</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary/70 text-[20px] transition-colors">mail</span>
<input class="input-premium w-full rounded-lg py-sm pl-12 pr-4 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none" placeholder="julian@example.com" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-xs group">
<label class="font-label-caps text-label-caps text-on-surface-variant/60 group-focus-within:text-primary transition-colors block px-xs">Security Key</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 group-focus-within:text-primary/70 text-[20px] transition-colors">lock</span>
<input class="input-premium w-full rounded-lg py-sm pl-12 pr-12 text-on-surface placeholder:text-on-surface-variant/30 focus:outline-none" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-on-surface-variant/40 hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-[20px]">visibility</span>
</button>
</div>
</div>

<div class="flex items-start gap-sm px-xs pt-xs">
<div class="relative flex items-center">

                    </label>

<a class="font-label-caps text-label-caps text-on-surface-variant/50 hover:text-primary transition-colors duration-300" href="#">Terms</a>

            </p>

<script>
        // Smooth feedback for interaction
        const inputs = document.querySelectorAll('input:not([type="checkbox"])');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                const label = input.closest('.group').querySelector('label');
                if(label) label.classList.add('text-primary');
            });
            input.addEventListener('blur', () => {
                const label = input.closest('.group').querySelector('label');
                if(label) label.classList.remove('text-primary');
            });
        });
    </script>
