<!-- Parallax Effect -->
<script>
        document.addEventListener('mousemove', (e) => {
            const moveX = (e.clientX - window.innerWidth / 2) / 60;
            const moveY = (e.clientY - window.innerHeight / 2) / 60;
            const hero = document.querySelector('img[data-alt]');
            if (hero) {
                hero.style.transform = `scale(1.1) translate(${moveX}px, ${moveY}px)`;
                hero.style.transition = 'transform 0.3s ease-out';
            }
        });
    </script>
